<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <style>
    .title { font: 30px Helvetica, Arial, sans-serif; fill: #1b1f23; }
    .subtitle { font: 18px Helvetica, Arial, sans-serif; fill: #374151; }
    .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
    .label { font: 20px Helvetica, Arial, sans-serif; fill: #111827; }
    .small { font: 15px Helvetica, Arial, sans-serif; fill: #374151; }
    .gridline { stroke: #64748b; stroke-width: 1.5; }
    .mapcell { fill: #ffffff; }
    .lava { fill: #fbbf24; }
    .goal { fill: #34d399; }
    .start { fill: #f87171; }
    .agent { fill: #60a5fa; }
    .state { font: 16px Helvetica, Arial, sans-serif; fill: #111827; }
  </style>
  <rect x="0" y="0" width="1200" height="500" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" class="title">State-Representation Tradeoffs in Lava World</text>
  <text x="600" y="70" text-anchor="middle" class="subtitle">Smaller states are easy to tabulate; richer states transfer better but eventually require function approximation.</text>

  <defs>
    <g id="base-map">
      <rect x="0" y="0" width="120" height="240" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <line x1="24" y1="0" x2="24" y2="240" class="gridline"/>
      <line x1="48" y1="0" x2="48" y2="240" class="gridline"/>
      <line x1="72" y1="0" x2="72" y2="240" class="gridline"/>
      <line x1="96" y1="0" x2="96" y2="240" class="gridline"/>
      <line x1="0" y1="24" x2="120" y2="24" class="gridline"/>
      <line x1="0" y1="48" x2="120" y2="48" class="gridline"/>
      <line x1="0" y1="72" x2="120" y2="72" class="gridline"/>
      <line x1="0" y1="96" x2="120" y2="96" class="gridline"/>
      <line x1="0" y1="120" x2="120" y2="120" class="gridline"/>
      <line x1="0" y1="144" x2="120" y2="144" class="gridline"/>
      <line x1="0" y1="168" x2="120" y2="168" class="gridline"/>
      <line x1="0" y1="192" x2="120" y2="192" class="gridline"/>
      <line x1="0" y1="216" x2="120" y2="216" class="gridline"/>
      <rect x="0" y="0" width="24" height="240" class="lava"/>
      <rect x="96" y="0" width="24" height="240" class="lava"/>
      <rect x="48" y="72" width="24" height="24" class="lava"/>
      <rect x="48" y="120" width="24" height="24" class="lava"/>
      <rect x="72" y="144" width="24" height="24" class="lava"/>
      <rect x="48" y="192" width="24" height="24" class="goal"/>
      <rect x="24" y="168" width="24" height="24" class="agent"/>
    </g>
  </defs>

  <g transform="translate(40 120)">
    <rect x="0" y="0" width="250" height="320" class="card"/>
    <text x="18" y="28" class="label">1. Cell position</text>
    <use href="#base-map" x="18" y="52"/>
    <text x="156" y="96" class="state">S = (i, j)</text>
    <text x="156" y="124" class="small">One state per cell.</text>
    <text x="156" y="148" class="small">Easy to tabulate.</text>
    <text x="18" y="288" class="small">Count: about 60 states on this map.</text>
  </g>

  <g transform="translate(330 120)">
    <rect x="0" y="0" width="250" height="320" class="card"/>
    <text x="18" y="28" class="label">2. Global coordinates</text>
    <use href="#base-map" x="18" y="52"/>
    <text x="156" y="96" class="state">S = coordinates</text>
    <text x="156" y="124" class="small">Still tabular.</text>
    <text x="156" y="148" class="small">Map-specific policy.</text>
    <text x="18" y="288" class="small">Weak transfer if the maze changes.</text>
  </g>

  <g transform="translate(620 120)">
    <rect x="0" y="0" width="250" height="320" class="card"/>
    <text x="18" y="28" class="label">3. Local neighborhood</text>
    <rect x="26" y="84" width="40" height="40" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <rect x="66" y="44" width="40" height="40" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <rect x="66" y="84" width="40" height="40" fill="#60a5fa" stroke="#475569" stroke-width="2"/>
    <rect x="106" y="84" width="40" height="40" fill="#fbbf24" stroke="#475569" stroke-width="2"/>
    <rect x="66" y="124" width="40" height="40" fill="#34d399" stroke="#475569" stroke-width="2"/>
    <text x="82" y="71" class="state">N</text>
    <text x="42" y="111" class="state">W</text>
    <text x="82" y="111" class="state">A</text>
    <text x="122" y="111" class="state">E</text>
    <text x="82" y="151" class="state">S</text>
    <text x="18" y="198" class="small">State = local pattern.</text>
    <text x="18" y="222" class="small">Transfers across maps.</text>
    <text x="18" y="246" class="small">Count: 2^4 + 4 * 2^3 = 48.</text>
    <text x="18" y="270" class="small">One neighbor may be the goal.</text>
    <text x="18" y="294" class="small">Better generalization without</text>
    <text x="18" y="316" class="small">the full-map blowup.</text>
  </g>

  <g transform="translate(910 120)">
    <rect x="0" y="0" width="250" height="320" class="card"/>
    <text x="18" y="28" class="label">4. Full map</text>
    <use href="#base-map" x="18" y="52"/>
    <text x="156" y="96" class="state">S = full map</text>
    <text x="156" y="124" class="small">Maximum info.</text>
    <text x="156" y="148" class="small">State count explodes.</text>
    <text x="18" y="288" class="small">Binary layouts: about 2^60 cases.</text>
    <text x="18" y="312" class="small">Use non-tabular Q-learning</text>
    <text x="18" y="334" class="small">or deep RL.</text>
  </g>
</svg>
