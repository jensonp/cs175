<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <style>
    .title { font: 30px Helvetica, Arial, sans-serif; fill: #1b1f23; }
    .subtitle { font: 18px Helvetica, Arial, sans-serif; fill: #374151; }
    .label { font: 16px Helvetica, Arial, sans-serif; fill: #111827; }
    .celltext { font: 22px Helvetica, Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .term { font: 20px Helvetica, Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .gridline { stroke: #475569; stroke-width: 2; }
    .wall { fill: #9dd6f9; }
    .plus { fill: #d1fae5; }
    .minus { fill: #fee2e2; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
  </style>
  <rect x="0" y="0" width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="46" text-anchor="middle" class="title">Gridworld Policy Regions</text>
  <text x="550" y="74" text-anchor="middle" class="subtitle">The optimal policy changes when the living reward r changes. Each boundary is a tie between two candidate actions.</text>

  <defs>
    <g id="grid">
      <rect x="0" y="0" width="160" height="120" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <line x1="40" y1="0" x2="40" y2="120" class="gridline"/>
      <line x1="80" y1="0" x2="80" y2="120" class="gridline"/>
      <line x1="120" y1="0" x2="120" y2="120" class="gridline"/>
      <line x1="0" y1="40" x2="160" y2="40" class="gridline"/>
      <line x1="0" y1="80" x2="160" y2="80" class="gridline"/>
      <rect x="40" y="40" width="40" height="40" class="wall"/>
      <rect x="120" y="0" width="40" height="40" class="plus"/>
      <rect x="120" y="40" width="40" height="40" class="minus"/>
      <text x="140" y="20" class="term">+1</text>
      <text x="140" y="60" class="term">-1</text>
    </g>
  </defs>

  <g transform="translate(70 120)">
    <rect x="-20" y="-24" width="220" height="210" class="panel"/>
    <text x="80" y="-2" text-anchor="middle" class="label">r &lt; -1.6497</text>
    <text x="80" y="18" text-anchor="middle" class="subtitle">Shortest route dominates</text>
    <use href="#grid" x="0" y="40"/>
    <text x="20" y="60" class="celltext">&gt;</text>
    <text x="60" y="60" class="celltext">&gt;</text>
    <text x="100" y="60" class="celltext">&gt;</text>
    <text x="20" y="100" class="celltext">^</text>
    <text x="100" y="100" class="celltext">^</text>
    <text x="20" y="140" class="celltext">^</text>
    <text x="60" y="140" class="celltext">&lt;</text>
    <text x="100" y="140" class="celltext">^</text>
    <text x="140" y="140" class="celltext">&lt;</text>
  </g>

  <g transform="translate(320 120)">
    <rect x="-20" y="-24" width="220" height="210" class="panel"/>
    <text x="80" y="-2" text-anchor="middle" class="label">-0.7311 &lt; r &lt; -0.4526</text>
    <text x="80" y="18" text-anchor="middle" class="subtitle">Safety starts to matter</text>
    <use href="#grid" x="0" y="40"/>
    <text x="20" y="60" class="celltext">&gt;</text>
    <text x="60" y="60" class="celltext">&gt;</text>
    <text x="100" y="60" class="celltext">&gt;</text>
    <text x="20" y="100" class="celltext">^</text>
    <text x="100" y="100" class="celltext">^</text>
    <text x="20" y="140" class="celltext">^</text>
    <text x="60" y="140" class="celltext">&gt;</text>
    <text x="100" y="140" class="celltext">^</text>
    <text x="140" y="140" class="celltext">^</text>
  </g>

  <g transform="translate(570 120)">
    <rect x="-20" y="-24" width="220" height="210" class="panel"/>
    <text x="80" y="-2" text-anchor="middle" class="label">-0.0274 &lt; r &lt; 0</text>
    <text x="80" y="18" text-anchor="middle" class="subtitle">Longer safer path wins</text>
    <use href="#grid" x="0" y="40"/>
    <text x="20" y="60" class="celltext">&gt;</text>
    <text x="60" y="60" class="celltext">&gt;</text>
    <text x="100" y="60" class="celltext">&gt;</text>
    <text x="20" y="100" class="celltext">^</text>
    <text x="100" y="100" class="celltext">&lt;</text>
    <text x="20" y="140" class="celltext">^</text>
    <text x="60" y="140" class="celltext">&lt;</text>
    <text x="100" y="140" class="celltext">&lt;</text>
    <text x="140" y="140" class="celltext">v</text>
  </g>

  <g transform="translate(820 120)">
    <rect x="-20" y="-24" width="220" height="210" class="panel"/>
    <text x="80" y="-2" text-anchor="middle" class="label">r &gt; 0</text>
    <text x="80" y="18" text-anchor="middle" class="subtitle">Wandering becomes attractive</text>
    <use href="#grid" x="0" y="40"/>
    <text x="20" y="60" class="celltext">^</text>
    <text x="60" y="60" class="celltext">^</text>
    <text x="100" y="60" class="celltext">&lt;</text>
    <text x="20" y="100" class="celltext">^</text>
    <text x="100" y="100" class="celltext">&lt;</text>
    <text x="20" y="140" class="celltext">^</text>
    <text x="60" y="140" class="celltext">^</text>
    <text x="100" y="140" class="celltext">&lt;</text>
    <text x="140" y="140" class="celltext">v</text>
  </g>

  <text x="550" y="380" text-anchor="middle" class="subtitle">Very negative step costs favor the shortest path. Milder costs favor safer detours. Positive living rewards can erase the incentive to terminate.</text>

  <g transform="translate(110 430)">
    <rect x="0" y="0" width="880" height="120" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="24" y="30" class="label">How to derive a boundary</text>
    <text x="24" y="58" class="subtitle">1. Pick two competing actions in the same state.</text>
    <text x="24" y="82" class="subtitle">2. Write each action value as immediate reward plus discounted continuation value.</text>
    <text x="24" y="106" class="subtitle">3. Solve Q*(s, a_1; r) = Q*(s, a_2; r) for r. The slide's thresholds are the roots of those equalities.</text>
  </g>
</svg>
