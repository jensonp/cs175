name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Validate project scaffold
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "::error::pyproject.toml is required for release verification."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

      - name: Run smoke simulation
        run: uv run python -m scheduler.cli smoke --seed 0

      - name: Build docs
        run: uv run python -m scheduler.docs build --output site

  package:
    name: package
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Validate project scaffold
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "::error::pyproject.toml is required for release packaging."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Build release artifacts
        run: |
          mkdir -p dist
          uv run python -m scheduler.docs build --output site

          if [ -d site ]; then
            tar -czf dist/docs-site.tar.gz -C site .
          fi

          if [ -d artifacts ]; then
            tar -czf dist/artifacts.tar.gz artifacts
          fi

          if [ -f report.pdf ]; then
            cp report.pdf dist/
          fi

          if ! find dist -mindepth 1 -print -quit | grep -q .; then
            echo "::error::No release artifacts were generated."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
