name: Bug report
description: Report a reproducible failure in the codebase, automation, or published output.
body:
  - type: markdown
    attributes:
      value: Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include commands, inputs, or files if possible.
      placeholder: 1. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add logs, screenshots, or environment details.
      placeholder: Python version, commit hash, OS, error output, etc.
